<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Architecture Academy</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0f1e; font-family: 'Segoe UI', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0f1e; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const WEEKS = [
      { week: 1, title: "The Core Internet", topics: ["DNS", "IP", "HTTP", "Scaling"] },
      { week: 2, title: "Load Balancing & API Gateways", topics: ["Round Robin", "Consistent Hashing", "API Gateway"] },
      { week: 3, title: "Databases 101", topics: ["SQL vs NoSQL", "Replication", "Read Replicas"] },
      { week: 4, title: "Caching Strategies", topics: ["Redis", "Memcached", "Cache Invalidation"] },
      { week: 5, title: "Database Scaling", topics: ["Sharding", "Partitioning", "Federation"] },
      { week: 6, title: "Async Processing", topics: ["Message Queues", "Pub/Sub", "Kafka"] },
      { week: 7, title: "Advanced Safety", topics: ["Idempotency", "Rate Limiting", "Circuit Breakers"] },
      { week: 8, title: "Capstone Project", topics: ["BookMyShow Design", "Global Scale"] },
    ];

    const XP_LEVELS = [
      { level: 1, title: "Intern Architect",    minXP: 0   },
      { level: 2, title: "Junior Architect",    minXP: 50  },
      { level: 3, title: "Mid Architect",       minXP: 120 },
      { level: 4, title: "Senior Architect",    minXP: 220 },
      { level: 5, title: "Staff Architect",     minXP: 350 },
      { level: 6, title: "Principal Architect", minXP: 500 },
      { level: 7, title: "Chief Architect",     minXP: 700 },
    ];

    function getLevelInfo(xp) {
      let current = XP_LEVELS[0], next = XP_LEVELS[1];
      for (let i = 0; i < XP_LEVELS.length; i++) {
        if (xp >= XP_LEVELS[i].minXP) {
          current = XP_LEVELS[i];
          next = XP_LEVELS[i + 1] || null;
        }
      }
      return { current, next };
    }

    // ── System diagrams per week ─────────────────────────────────────────────
    const SYSTEM_NODES = {
      1: [
        { label: "👤 User",            color: "#6366f1" },
        { label: "🖥️ Single Server",   color: "#0ea5e9" },
        { label: "🗄️ Single Database", color: "#10b981" },
      ],
      2: [
        { label: "👤 User",            color: "#6366f1" },
        { label: "⚖️ Load Balancer",   color: "#f59e0b" },
        { label: "🖥️ Server × N",      color: "#0ea5e9" },
        { label: "🗄️ Database",        color: "#10b981" },
      ],
      3: [
        { label: "👤 User",            color: "#6366f1" },
        { label: "⚖️ Load Balancer",   color: "#f59e0b" },
        { label: "🖥️ Server × N",      color: "#0ea5e9" },
        { label: "🗄️ Primary DB",      color: "#10b981" },
        { label: "🗄️ Replica DB",      color: "#059669" },
      ],
      4: [
        { label: "👤 User",            color: "#6366f1" },
        { label: "⚖️ Load Balancer",   color: "#f59e0b" },
        { label: "🖥️ Server × N",      color: "#0ea5e9" },
        { label: "⚡ Cache (Redis)",   color: "#ec4899" },
        { label: "🗄️ DB + Replica",    color: "#10b981" },
      ],
    };

    function SystemDiagram({ week }) {
      const nodes = SYSTEM_NODES[Math.min(week, 4)] || SYSTEM_NODES[1];
      return (
        <div style={{ background: "#0a0f1e", borderRadius: 10, padding: 16, marginTop: 12 }}>
          <div style={{ color: "#475569", fontSize: 11, marginBottom: 14, textTransform: "uppercase", letterSpacing: 1 }}>
            Week {week} Architecture
          </div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, flexWrap: "wrap" }}>
            {nodes.map((n, i) => (
              <React.Fragment key={i}>
                <div style={{
                  background: n.color + "22", border: `1.5px solid ${n.color}`,
                  borderRadius: 8, padding: "10px 14px", color: "#f1f5f9",
                  fontWeight: 600, fontSize: 13, textAlign: "center", minWidth: 110,
                }}>
                  {n.label}
                </div>
                {i < nodes.length - 1 && (
                  <div style={{ color: "#334155", fontSize: 20 }}>→</div>
                )}
              </React.Fragment>
            ))}
          </div>
        </div>
      );
    }

    function XPBar({ xp }) {
      const { current, next } = getLevelInfo(xp);
      const pct = next ? ((xp - current.minXP) / (next.minXP - current.minXP)) * 100 : 100;
      return (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
            <span style={{ fontWeight: 700, color: "#facc15", fontSize: 15 }}>
              Lvl {current.level} — {current.title}
            </span>
            <span style={{ color: "#64748b", fontSize: 12 }}>
              {xp} {next ? `/ ${next.minXP} XP` : "XP (MAX)"}
            </span>
          </div>
          <div style={{ background: "#1e293b", borderRadius: 99, height: 10, overflow: "hidden" }}>
            <div style={{
              width: `${pct}%`, height: "100%",
              background: "linear-gradient(90deg,#facc15,#f97316)",
              borderRadius: 99, transition: "width .6s ease",
            }} />
          </div>
          {next && (
            <div style={{ color: "#475569", fontSize: 11, marginTop: 4 }}>
              {next.minXP - xp} XP until {next.title}
            </div>
          )}
        </div>
      );
    }

    function WeekCard({ data, currentWeek }) {
      const past = data.week < currentWeek;
      const active = data.week === currentWeek;
      const future = data.week > currentWeek;
      return (
        <div style={{
          background: active ? "#1e3a5f" : "#0f172a",
          border: `1px solid ${active ? "#3b82f6" : past ? "#22c55e33" : "#1e293b"}`,
          borderRadius: 10, padding: "12px 14px",
          opacity: future ? 0.4 : 1, position: "relative",
        }}>
          {active && (
            <span style={{
              position: "absolute", top: 8, right: 10,
              background: "#3b82f6", color: "#fff",
              fontSize: 9, fontWeight: 700, padding: "2px 7px",
              borderRadius: 99, textTransform: "uppercase",
            }}>Active</span>
          )}
          {past && (
            <span style={{ position: "absolute", top: 8, right: 10, color: "#22c55e", fontSize: 14 }}>✓</span>
          )}
          <div style={{ color: "#475569", fontSize: 10, marginBottom: 3 }}>Week {data.week}</div>
          <div style={{ color: "#f1f5f9", fontWeight: 700, fontSize: 13, marginBottom: 7 }}>{data.title}</div>
          <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
            {data.topics.map(t => (
              <span key={t} style={{
                background: "#1e293b", color: "#64748b",
                fontSize: 10, padding: "2px 7px", borderRadius: 99, border: "1px solid #334155",
              }}>{t}</span>
            ))}
          </div>
        </div>
      );
    }

    function Dashboard() {
      const [xp]          = React.useState(0);
      const [currentWeek] = React.useState(1);

      const card = (children, style = {}) => (
        <div style={{
          background: "#0f172a", border: "1px solid #1e293b",
          borderRadius: 12, padding: 20, marginBottom: 20, ...style,
        }}>
          {children}
        </div>
      );

      const sectionLabel = (text) => (
        <div style={{ color: "#475569", fontSize: 11, textTransform: "uppercase", letterSpacing: 1, marginBottom: 14 }}>
          {text}
        </div>
      );

      return (
        <div style={{
          background: "#0a0f1e", color: "#f1f5f9",
          minHeight: "100vh", padding: "24px 16px", maxWidth: 860, margin: "0 auto",
        }}>
          {/* Header */}
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 28 }}>
            <div style={{ fontSize: 36 }}>🏛️</div>
            <div style={{ flex: 1 }}>
              <h1 style={{ fontSize: 22, fontWeight: 800, color: "#f8fafc" }}>Architecture Academy</h1>
              <div style={{ color: "#475569", fontSize: 13, marginTop: 2 }}>8-Week System Design Mastery</div>
            </div>
            <div style={{
              background: "#1e293b", border: "1px solid #334155",
              borderRadius: 10, padding: "8px 16px", textAlign: "center",
            }}>
              <div style={{ color: "#475569", fontSize: 10, textTransform: "uppercase", letterSpacing: 1 }}>Week</div>
              <div style={{ color: "#facc15", fontWeight: 800, fontSize: 26, lineHeight: 1 }}>{currentWeek}</div>
              <div style={{ color: "#475569", fontSize: 10 }}>of 8</div>
            </div>
          </div>

          {/* XP Card */}
          {card(<>
            {sectionLabel("Progress")}
            <XPBar xp={xp} />
            <div style={{ display: "flex", gap: 28, marginTop: 14 }}>
              {[
                { label: "Total XP",       value: xp,                    color: "#facc15" },
                { label: "Correct Picks",  value: Math.floor(xp / 15),   color: "#22c55e" },
                { label: "Days Active",    value: 1,                      color: "#0ea5e9" },
              ].map(({ label, value, color }) => (
                <div key={label}>
                  <div style={{ color: "#475569", fontSize: 11 }}>{label}</div>
                  <div style={{ color, fontWeight: 700, fontSize: 22 }}>{value}</div>
                </div>
              ))}
            </div>
          </>)}

          {/* System Diagram */}
          {card(<>
            {sectionLabel("Your Growing System")}
            <SystemDiagram week={currentWeek} />
            <div style={{ color: "#334155", fontSize: 11, textAlign: "center", marginTop: 12 }}>
              Architecture evolves each week as we add components
            </div>
          </>)}

          {/* Curriculum */}
          {card(<>
            {sectionLabel("Curriculum Roadmap")}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {WEEKS.map(w => <WeekCard key={w.week} data={w} currentWeek={currentWeek} />)}
            </div>
          </>)}

          <div style={{ color: "#1e293b", textAlign: "center", fontSize: 11, marginTop: 8 }}>
            Architecture Academy · Built with Claude Code
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Dashboard />);
  </script>
</body>
</html>
